<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baazigar Landing</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #0f1c3f, #000);
    }

    .card {
        width: 90%;
        max-width: 380px;
        padding: 25px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        text-align: center;
        color: #fff;
        box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    .profile {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        margin: auto;
        padding: 5px;
        background: linear-gradient(45deg, #00f7ff, #00ff88);
    }

    .profile img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
    }

    h1 {
        margin-top: 15px;
        font-size: 28px;
        font-weight: bold;
    }

    .subs {
        margin: 8px 0;
        font-size: 16px;
        color: #ccc;
    }

    .tagline {
        margin: 15px 0;
        font-size: 15px;
        color: #ddd;
    }

    .redirect {
        color: #00ffd5;
        font-size: 20px;
        margin: 20px 0;
        font-weight: bold;
    }

    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 14px 25px;
        border-radius: 50px;
        background: linear-gradient(90deg, #00ffd5, #4facfe);
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
    }

    .footer {
        margin-top: 20px;
        font-size: 14px;
        color: #bbb;
    }
</style>

</head>

<body>

<div class="card">

    <div class="profile">
        <img src="https://via.placeholder.com/150" alt="profile">
    </div>

    <h1>Baazigar™</h1>
    <div class="subs">144,817 subscribers</div>

    <div class="tagline">
        Hum Koi Baazi Khele to haare kam hai... 🔥
    </div>

    <div class="redirect" id="countdown">
        Redirecting in 57s
    </div>

    <a href="#" class="btn">🚀 Join Channel</a>

    <div class="footer">
        Instant access • No waiting ⚡
    </div>

</div>

<script>
    let time = 57;
    let countdown = document.getElementById("countdown");

    setInterval(() => {
        if(time > 0){
            time--;
            countdown.innerText = "Redirecting in " + time + "s";
        }
    }, 1000);
</script>

</body>
</html>
